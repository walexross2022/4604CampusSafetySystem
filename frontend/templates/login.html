<!DOCTYPE html>
<html>
<head>
    <title>Login - VT Campus Safety System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f5;
        }

        .header-bar {
            background-color: #861F41;
            color: white;
            padding: 20px;
        }

        .card {
            border-radius: 10px;
        }

        .btn-main {
            width: 100%;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="header-bar text-center">
    <h1>Virginia Tech Campus Safety & Incident Analytics System</h1>
    <p class="mb-0">Login</p>
</div>

<div class="container mt-5 d-flex justify-content-center">

    <div class="col-md-5">

        <div class="card shadow-sm">
            <div class="card-body">

                <h4 class="text-center mb-4">Account Login</h4>

                <!-- ERROR MESSAGE -->
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <div class="alert alert-danger text-center">
                            {{ messages[0] }}
                        </div>
                    {% endif %}
                {% endwith %}

                <form method="POST">

                    <!-- USERNAME -->
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input 
                            name="username" 
                            class="form-control" 
                            placeholder="Enter username" 
                            required>
                    </div>

                    <!-- PASSWORD -->
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input 
                            name="password" 
                            type="password" 
                            class="form-control" 
                            placeholder="Enter password" 
                            required>
                    </div>

                    <!-- SUBMIT -->
                    <button type="submit" class="btn btn-dark btn-main">
                        Login
                    </button>

                </form>

                <!-- SIGNUP LINK -->
                <div class="text-center mt-3">
                    <p class="mb-1">Don't have an account?</p>
                    <a href="{{ url_for('signup') }}">Create one here</a>
                </div>

                <!-- BACK -->
                <div class="text-center mt-2">
                    <a href="{{ url_for('welcome') }}" class="text-muted">
                        ← Back to Welcome
                    </a>
                </div>

            </div>
        </div>

    </div>

</div>

</body>
</html>
