<!DOCTYPE html>
<html>
<head>
    <title>Select Incident to Edit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-body">

            <h4 class="text-center mb-4">Select Incident to Edit</h4>

            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Case #</th>
                        <th>Date Reported</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    {% for i in incidents %}
                    <tr>
                        <td>{{ i.case_number }}</td>
                        <td>{{ i.date_reported }}</td>
                        <td>
                            <a href="/edit_incident/{{ i.incident_id }}" 
                               class="btn btn-sm btn-warning">
                                Edit
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

            <div class="text-center mt-3">
                <a href="/" class="btn btn-dark">Back</a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
