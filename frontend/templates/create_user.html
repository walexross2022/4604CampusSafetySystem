<!DOCTYPE html>
<html>
<head>
    <title>Create User - VT Campus Safety System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f5;
        }

        .header-bar {
            background-color: #861F41;
            color: white;
            padding: 20px;
        }

        .card {
            border-radius: 10px;
        }

        .btn-main {
            width: 100%;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="header-bar text-center">
    <h1>Virginia Tech Campus Safety & Incident Analytics System</h1>
    <p class="mb-0">Create User (Admin)</p>
</div>

<div class="container mt-5 d-flex justify-content-center">

    <div class="col-md-5">

        <div class="card shadow-sm">
            <div class="card-body">

                <h4 class="text-center mb-4">Create New User</h4>

                <!-- FLASH MESSAGE -->
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <div class="alert alert-info text-center">
                            {{ messages[0] }}
                        </div>
                    {% endif %}
                {% endwith %}

                <form method="POST">

                    <!-- USERNAME -->
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input 
                            name="username" 
                            class="form-control" 
                            placeholder="Enter username" 
                            required>
                    </div>

                    <!-- PASSWORD -->
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input 
                            type="password" 
                            name="password" 
                            class="form-control" 
                            placeholder="Enter password" 
                            required>
                    </div>

                    <!-- ROLE -->
                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <select name="role" class="form-control">
                            <option value="user">Regular User</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>

                    <!-- SUBMIT -->
                    <button type="submit" class="btn btn-dark btn-main">
                        Create User
                    </button>

                </form>

                <!-- BACK -->
                <div class="text-center mt-3">
                    <a href="{{ url_for('home') }}" class="text-muted">
                        ← Back to Home
                    </a>
                </div>

            </div>
        </div>

    </div>

</div>

</body>
</html>
