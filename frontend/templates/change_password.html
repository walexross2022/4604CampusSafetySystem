<!DOCTYPE html>
<html>
<head>
    <title>Change Password - VT Campus Safety System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f5;
        }

        .header-bar {
            background-color: #861F41;
            color: white;
            padding: 20px;
        }

        .card {
            border-radius: 10px;
        }

        .btn-main {
            width: 100%;
        }
    </style>
</head>

<body>

<div class="header-bar text-center">
    <h1>Virginia Tech Campus Safety & Incident Analytics System</h1>
    <p class="mb-0">Change Password</p>
</div>

<div class="container mt-5 d-flex justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body">

                <h4 class="text-center mb-4">Update Password</h4>

                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <div class="alert alert-info text-center">
                            {{ messages[0] }}
                        </div>
                    {% endif %}
                {% endwith %}

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">Current Password</label>
                        <input type="password" name="current_password" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <input type="password" name="new_password" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Confirm New Password</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-dark btn-main">
                        Update Password
                    </button>

                </form>

                <div class="text-center mt-3">
                    <a href="{{ url_for('home') }}" class="text-muted">
                        ← Back to Home
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>

</body>
</html>
